<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="stylee.css">
</head>
<body>

    <h1>Rock Paper Scissors</h1>
    <p class="creator">Developed By Engineer Waleed Ahmad</p>

    <div class="choices">
        <button class="choice" id="rock">✊ Rock</button>
        <button class="choice" id="paper">✋ Paper</button>
        <button class="choice" id="scissors">✌️ Scissors</button>
    </div>

    <div class="score-board">
        <div>
            <h2 id="user-score">0</h2>
            <p>You</p>
        </div>

        <div>
            <h2 id="comp-score">0</h2>
            <p>Computer</p>
        </div>
    </div>

    <div class="message-container">
        <p id="msg">Choose Rock, Paper, or Scissors</p>
    </div>

    <button id="reset-btn">Reset Game</button>

    <script src="appp.js"></script>

</body>
</html>
